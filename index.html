<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>incplot HTML Outputs</title>
  <style>
    :root {
      color-scheme: light;
    }

    body {
      margin: 0;
      padding: 24px;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: #f7f7f7;
      color: #1f1f1f;
    }

    h1 {
      margin: 0 0 20px;
      font-size: 28px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .card {
      background: #ffffff;
      border: 1px solid #d8d8d8;
      border-radius: 8px;
      overflow: hidden;
    }

    .card h2 {
      margin: 0;
      padding: 10px 12px;
      font-size: 16px;
      border-bottom: 1px solid #ececec;
      background: #fafafa;
    }

    iframe {
      display: block;
      width: 100%;
      height: 420px;
      border: 0;
      background: #fff;
    }
  </style>
</head>
<body>
  <h1>incplot HTML Outputs</h1>

  <div class="grid">
    <section class="card">
      <h2>BarHM</h2>
      <iframe src="html_output/BarHM.html" loading="lazy" title="BarHM"></iframe>
    </section>

    <section class="card">
      <h2>BarHS</h2>
      <iframe src="html_output/BarHS.html" loading="lazy" title="BarHS"></iframe>
    </section>

    <section class="card">
      <h2>BarVM</h2>
      <iframe src="html_output/BarVM.html" loading="lazy" title="BarVM"></iframe>
    </section>

    <section class="card">
      <h2>multiline</h2>
      <iframe src="html_output/multiline.html" loading="lazy" title="multiline"></iframe>
    </section>

    <section class="card">
      <h2>scatter</h2>
      <iframe src="html_output/scatter.html" loading="lazy" title="scatter"></iframe>
    </section>
  </div>
</body>
</html>
