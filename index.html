<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Example outputs of incplot in 'HTML mode'</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #141414;
      --main: #bab7b6;
    }

    body {
      margin: 0;
      padding: 24px;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: var(--bg);
      color: var(--main);
    }

    h1 {
      margin: 0 0 20px;
      font-size: 28px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .card {
      background: #1c1c1c;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      overflow: hidden;
    }

    .card h2 {
      margin: 0;
      padding: 10px 12px;
      font-size: 16px;
      border-bottom: 1px solid #2a2a2a;
      background: #202020;
      color: var(--main);
    }

    iframe {
      display: block;
      width: 100%;
      height: 420px;
      border: 0;
      background: #fff;
    }
  </style>
</head>

<body>
  <h1>incplot HTML Outputs</h1>

  <div class="grid">
    <section class="card">
      <h2>Scatter Plot</h2>
      <iframe src="html_output/scatter.html" loading="lazy" title="scatter"></iframe>
    </section>

    <section class="card">
      <h2>Multi-line Plot</h2>
      <iframe src="html_output/multiline.html" loading="lazy" title="multiline"></iframe>
    </section>

    <section class="card">
      <h2>Bar Horizontal (Stacked)</h2>
      <iframe src="html_output/BarHS.html" loading="lazy" title="BarHS"></iframe>
    </section>

    <section class="card">
      <h2>Bar Vertical (Multi)</h2>
      <iframe src="html_output/BarVM.html" loading="lazy" title="BarVM"></iframe>
    </section>

    <section class="card">
      <h2>Bar Horizontal (Multi)</h2>
      <iframe src="html_output/BarHM.html" loading="lazy" title="BarHM"></iframe>
    </section>
  </div>
</body>

</html>
